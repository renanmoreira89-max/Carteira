<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Dashboard de Investimentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Remove as barras de rolagem horizontais padrão mantendo a função do carrossel ativa */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<body class="bg-slate-900 text-slate-100 min-h-screen pb-12 overflow-x-hidden">

    <nav class="border-b border-slate-700 bg-slate-900 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-emerald-500/10 text-emerald-400 rounded-[18px]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.003 9.003 0 1020.945 13H11V3.055z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>
                </div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">Minha Carteira</h1>
                </div>
            </div>
            
            <div class="flex bg-slate-800 p-1 rounded-[20px] border border-slate-700">
                <button onclick="alternarAba('carteira')" id="btn-aba-carteira" class="px-4 py-2 text-sm font-medium rounded-[15px] bg-emerald-600 text-white transition-all">
                    Patrimônio
                </button>
                <button onclick="alternarAba('dividendos')" id="btn-aba-dividendos" class="px-4 py-2 text-sm font-medium rounded-[15px] text-slate-400 hover:text-slate-200 transition-all">
                    Proventos
                </button>
            </div>
        </div>
    </nav>

    <!-- Container controlador do Carrossel por gesto de deslize (Swipe) -->
    <div id="carousel-viewport" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar w-full">
        
        <!-- PÁGINA 1: PATRIMÔNIO -->
        <div class="w-full shrink-0 snap-start">
            <main id="conteudo-carteira" class="max-w-4xl mx-auto px-4 mt-8 space-y-5">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div class="bg-slate-800/50 border border-slate-700 rounded-[40px] p-5">
                        <p class="text-2xl font-medium text-slate-400 pl-[10px]">Saldo Total</p>
                        <p id="card-total" class="text-[44px] font-bold mt-1 text-emerald-400 pl-[10px]">R$ 0,00</p>
                    </div>
                    <div class="bg-slate-800/50 border border-slate-700 rounded-[40px] p-5">
                        <p class="text-2xl font-medium text-slate-400 pl-[10px]">Brasil</p>
                        <p id="card-nacional" class="text-4xl font-bold mt-2 text-white pl-[10px]">R$ 0,00</p>
                    </div>
                    <div class="bg-slate-800/50 border border-slate-700 rounded-[40px] p-5">
                        <p class="text-2xl font-medium text-slate-400 pl-[10px]">Exterior</p>
                        <p id="card-exterior" class="text-4xl font-bold mt-2 text-blue-400 pl-[10px]">US$ 0,00</p>
                        <p id="card-exterior-brl" class="text-sm text-slate-500 mt-1 pl-[10px]">Câmbio: R$ 0,00</p>
                    </div>
                </div>

                <div id="lista-ativos-cards" class="space-y-3">
                    <div class="text-center py-12 text-slate-500 bg-slate-800/20 border border-slate-700 rounded-[30px]">
                        Carregando dados automaticamente...
                    </div>
                </div>

                <!-- Botão discreto de atualização manual se você não quiser esperar o timer de 2 min -->
                <div class="flex justify-end pr-2">
                    <button type="button" onclick="puxarDadosDaPlanilha()" class="text-xs text-slate-400 hover:text-emerald-400 flex items-center gap-1 transition-all">
                        Atualizar agora
                    </button>
                </div>
            </main>
        </div>

        <!-- PÁGINA 2: PROVENTOS -->
        <div class="w-full shrink-0 snap-start">
            <main id="conteudo-dividendos" class="max-w-7xl mx-auto px-4 sm:px-6 mt-8 space-y-6">
                
                <div class="bg-slate-800/40 border border-slate-700 rounded-[40px] p-5 flex flex-col gap-2 relative">
                    <div class="flex justify-between items-center w-full">
                        <p class="text-[19px] pl-2 font-medium text-slate-400">TOTAL DE PROVENTOS</p>
                        
                        <div class="relative cursor-pointer w-[113px] pr-0 flex-shrink-0" onclick="abrirSeletorDataModerno()">
                            <input type="text" id="filtro-mes-div" readonly class="bg-slate-900 border border-slate-700 text-white rounded-[18px] pl-5 pr-0 py-2 w-full text-left focus:outline-none focus:border-emerald-500 font-medium cursor-pointer text-sm" placeholder="Mês">
                            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <p id="total-mes-dividendos" class="text-[40px] pl-2 font-bold text-emerald-400 mt-1">R$ 0,00</p>
                    <input type="date" id="input-data-oculto" class="absolute opacity-0 pointer-events-none" onchange="atualizarMesPeloDataPicker(this.value)">
                </div>
           
                <div class="bg-slate-800/50 border border-slate-700 rounded-[40px] p-6 space-y-4">
                    <h3 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                        Provento
                    </h3>
                    <div class="grid grid-cols-2 gap-4 items-end">
                        <div class="col-span-1">
                            <label class="block text-xs text-slate-400 mb-1 pl-2">CÓDIGO / ATIVO</label>
                            <input type="text" id="div-input-ativo" oninput="atualizarAvisoQuantidade()" placeholder="" class="w-full bg-slate-900 border border-slate-700 rounded-[18px] px-3 py-2 text-center text-white font-bold uppercase placeholder:font-normal focus:outline-none focus:border-emerald-500">
                        </div>
                        
                        <div class="col-span-1">
                            <div class="flex justify-between items-center mb-1 pl-2">
                                <label class="text-xs text-slate-400">VALOR (R$)</label>
                                <span id="aviso-qtd-carteira" class="text-xs text-emerald-400 font-medium"></span>
                            </div>
                            <input type="number" step="0.0001" id="div-input-valor-cota" placeholder="" class="w-full bg-slate-900 border border-slate-700 rounded-[18px] px-3 py-2 text-center text-white focus:outline-none focus:border-emerald-500">
                        </div>
                        
                        <button type="button" onclick="adicionarDividendo()" class="col-span-2 w-full h-10 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-[18px] transition-all text-[15px] shadow-md">
                            ADICIONAR
                        </button>
                    </div>
                </div>

                <div class="bg-slate-800/20 border border-slate-700 rounded-[35px] overflow-hidden w-full">
                    <div class="overflow-x-auto touch-action-pan-x">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider bg-slate-900/50">
                                    <th class="py-4 px-2 sm:px-5 text-center">Ativo</th>
                                    <th class="py-4 px-2 sm:px-5 text-center">Mês</th>
                                    <th class="py-4 px-2 sm:px-5 text-center">Valor</th>
                                    <th class="py-4 px-2 sm:px-5 text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-dividendos-body" class="divide-y divide-slate-800/60 text-sm">
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

    </div>    

    <script>
        const LINK_PLANILHA_PADRAO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSANcAncbi_YPcolHZquRIHo1ExH6Rzbd7rMtkAj1uevsa_M8_nXwl-ZMffOrKCTcxIVf79fy33H1I/pub?output=tsv"; 

        let listaDividendos = [];
        let cacheAtivosCarteira = [];
        let cacheCotacaoDolar = 5.40;

        // ================= SISTEMA DE CONTROLE DO CALENDÁRIO MATERIAL DESIGN =================

        function abrirSeletorDataModerno() {
            const inputOculto = document.getElementById("input-data-oculto");
            const valorAtual = document.getElementById("filtro-mes-div").value; 
            
            if (valorAtual && valorAtual.includes('/')) {
                const [mes, ano] = valorAtual.split('/');
                inputOculto.value = `${ano}-${mes}-01`;
            }
            
            if (typeof inputOculto.showPicker === 'function') {
                inputOculto.showPicker();
            } else {
                inputOculto.click();
            }
        }

        function atualizarMesPeloDataPicker(dataString) {
            if (!dataString) return;
            const [ano, mes, dia] = dataString.split('-');
            
            document.getElementById("filtro-mes-div").value = `${mes}/${ano}`;
            renderizarDividendos();
        }

        // ================= SISTEMA DE CARTEIRA COM SCROLL DO CARROSSEL =================

        function alternarAba(aba, instantaneo = false) {
            const viewport = document.getElementById("carousel-viewport");
            if (!viewport) return;

            const targetLeft = aba === 'carteira' ? 0 : viewport.offsetWidth;
            viewport.scrollTo({
                left: targetLeft,
                behavior: instantaneo ? 'auto' : 'smooth'
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const viewport = document.getElementById("carousel-viewport");
            if (viewport) {
                viewport.addEventListener('scroll', () => {
                    const width = viewport.offsetWidth;
                    if (width > 0) {
                        const paginaReal = Math.round(viewport.scrollLeft / width);
                        const btnCarteira = document.getElementById("btn-aba-carteira");
                        const btnDividendos = document.getElementById("btn-aba-dividendos");
                        
                        if (paginaReal === 0) {
                            btnCarteira.className = "px-4 py-2 text-sm font-medium rounded-[15px] bg-emerald-600 text-white transition-all";
                            btnDividendos.className = "px-4 py-2 text-sm font-medium rounded-[14px] text-slate-400 hover:text-slate-200 transition-all";
                            try { localStorage.setItem("dashboard_aba_atual", 'carteira'); } catch(e) {}
                        } else {
                            btnCarteira.className = "px-4 py-2 text-sm font-medium rounded-[15px] text-slate-400 hover:text-slate-200 transition-all";
                            btnDividendos.className = "px-4 py-2 text-sm font-medium rounded-[15px] bg-emerald-600 text-white transition-all";
                            try { localStorage.setItem("dashboard_aba_atual", 'dividendos'); } catch(e) {}
                            renderizarDividendos(); 
                        }
                    }
                });
            }
        });

        function tratarNumeroBR(valor) {
            if (!valor) return 0;
            let limpo = valor.toString().replace('%', '').trim().replace(/\s/g, '');
            if (limpo.includes('.') && limpo.includes(',')) {
                limpo = limpo.replace(/\./g, '').replace(',', '.');
            } else {
                limpo = limpo.replace(',', '.');
            }
            let num = parseFloat(limpo);
            return isNaN(num) ? 0 : num;
        }

        function formatarNumeroApenas(valor) {
            return valor.toFixed(2).replace('.', ',').replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        }

        function formatarQuantidade(valor) {
            return Math.round(valor).toString().replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        }

        function formatarVariacaoApenasPorcentagem(valor) {
            if (valor > 0) {
                return { texto: `(+${valor.toFixed(2).replace('.', ',')}%)`, classe: 'text-emerald-400' };
            } else if (valor < 0) {
                return { texto: `(-${Math.abs(valor).toFixed(2).replace('.', ',')}%)`, classe: 'text-rose-400' };
            }
            return { texto: '(0,00%)', classe: 'text-slate-400' };
        }

        function puxarDadosDaPlanilha() {
            // Puxa diretamente e estritamente da URL padrão definida no código
            fetch(LINK_PLANILHA_PADRAO)
                .then(response => {
                    if (!response.ok) throw new Error("Erro na requisição");
                    return response.text();
                })
                .then(text => { processarDadosTSV(text); })
                .catch(error => { console.error("Erro ao atualizar planilha:", error); });
        }

        function processarDadosTSV(conteudo) {
            let lines = conteudo.split(/\r?\n/);
            let ativos = [];
            let cotacaoDolar = 5.40;

            for (let i = 0; i < lines.length; i++) {
                let colunas = lines[i].split('\t');
                if (colunas.length < 5) continue;

                let ticker = colunas[0].trim().toUpperCase();
                if (ticker === "ATIVO" || ticker === "TICKER" || ticker === "CÓDIGO" || ticker === "") continue;

                let qtd = tratarNumeroBR(colunas[1]);
                let precoAtivo = tratarNumeroBR(colunas[2]); 
                let totalItem = tratarNumeroBR(colunas[3]);  
                
                if (ticker === 'CAMBIO' || ticker === 'DOLAR' || colunas[5]?.trim().toLowerCase() === 'cambio') {
                    if (precoAtivo > 0) cotacaoDolar = precoAtivo; 
                    continue; 
                }

                let variacaoPct = tratarNumeroBR(colunas[4]); 
                let tipo = colunas[5] ? colunas[5].trim().toLowerCase() : 'nacional';
                
                let pctAtual = colunas[6] ? tratarNumeroBR(colunas[6]) : 0;
                let pctIdeal = colunas[7] ? tratarNumeroBR(colunas[7]) : 0;

                ativos.push({ ticker, qtd, precoAtivo, totalItem, variacaoPct, tipo, pctAtual, pctIdeal });
            }
            cacheAtivosCarteira = ativos;
            cacheCotacaoDolar = cotacaoDolar;
            renderizarCards(ativos, cotacaoDolar);
            atualizarAvisoQuantidade();
        }

        function renderizarCards(ativos, dolar) {
            let container = document.getElementById("lista-ativos-cards");
            container.innerHTML = "";
            let totalNacional = 0;
            let totalExteriorUsd = 0;

            if (ativos.length === 0) {
                // SINTAXE CORRIGIDA: Adicionadas crases corretas na String
                container.innerHTML = `<div class="text-center py-12 text-slate-500 bg-slate-800/20 border border-slate-700 rounded-[18px]">Nenhum ativo válido encontrado.</div>`;
                return;
            }

            ativos.forEach(item => {
                if (item.tipo === 'nacional') { totalNacional += item.totalItem; } 
                else { totalExteriorUsd += item.totalItem; }

                let infoVariacao = formatarVariacaoApenasPorcentagem(item.variacaoPct);
                let prefixoMoeda = item.tipo === 'nacional' ? 'R$' : 'US$';

                let card = document.createElement("div");
                card.className = "bg-slate-900 border border-slate-700/80 rounded-[30px] p-4 flex justify-between items-center hover:border-slate-700/60 transition-all shadow-sm";
                
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="flex items-baseline gap-2">
                            <span class="text-lg font-bold tracking-wide text-white">${item.ticker}</span>
                            <span class="text-xs font-semibold text-slate-500">(${formatarQuantidade(item.qtd)})</span>
                        </div>
                        <div class="text-xs font-medium text-slate-400">
                            <span>${item.pctAtual.toFixed(2).replace('.', ',')}%</span>
                            <span class="text-slate-600 mx-1">/</span>
                            <span class="text-slate-400">${item.pctIdeal.toFixed(2).replace('.', ',')}%</span>
                        </div>
                    </div>
                    <div class="text-right space-y-0.5">
                        <div class="text-base font-bold tracking-tight text-slate-100">
                            ${prefixoMoeda} ${formatarNumeroApenas(item.totalItem)}
                        </div>
                        <div class="text-xs font-mono text-slate-400 flex justify-end items-center gap-1.5">
                            <span>${formatarNumeroApenas(item.precoAtivo)}</span>
                            <span class="${infoVariacao.classe} font-semibold">${infoVariacao.texto}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            let totalExteriorBrl = totalExteriorUsd * dolar;
            let saldoGeralBrl = totalNacional + totalExteriorBrl;

            document.getElementById("card-total").innerText = "R$ " + formatarNumeroApenas(saldoGeralBrl);
            document.getElementById("card-nacional").innerText = "R$ " + formatarNumeroApenas(totalNacional);
            document.getElementById("card-exterior").innerText = "US$ " + formatarNumeroApenas(totalExteriorUsd);
            document.getElementById("card-exterior-brl").innerText = "Câmbio USD/BRL: R$ " + dolar.toFixed(2).replace('.', ',');
        }

        // ================= GESTÃO DE DIVIDENDOS =================

        function atualizarAvisoQuantidade() {
            let ativoDigitado = document.getElementById("div-input-ativo").value.trim().toUpperCase();
            let avisoSpan = document.getElementById("aviso-qtd-carteira");
            
            if (!ativoDigitado) {
                avisoSpan.innerText = "";
                return;
            }

            let ativoLocalizado = cacheAtivosCarteira.find(a => a.ticker === ativoDigitado);
            if (ativoLocalizado) {
                avisoSpan.innerText = `${formatarQuantidade(ativoLocalizado.qtd)} cotas`;
            } else {
                avisoSpan.innerText = "0 cotas";
            }
        }

        function adicionarDividendo() {
            let inputAtivo = document.getElementById("div-input-ativo");
            let inputValorCota = document.getElementById("div-input-valor-cota");
            let filtroMes = document.getElementById("filtro-mes-div");

            let ativo = inputAtivo.value.trim().toUpperCase();
            let valorCota = parseFloat(inputValorCota.value);
            let mesRef = filtroMes.value; 

            if (!ativo || isNaN(valorCota) || valorCota <= 0 || !mesRef) {
                alert("Por favor, preencha todos os campos corretamente.");
                return;
            }

            let ativoNaCarteira = cacheAtivosCarteira.find(a => a.ticker === ativo);
            let quantidadeCotas = ativoNaCarteira ? ativoNaCarteira.qtd : 0;

            if (quantidadeCotas === 0) {
                let confirmar = confirm(`Você possui 0 cotas listadas de ${ativo} hoje na carteira. O valor calculated será R$ 0,00. Deseja prosseguir?`);
                if (!confirmar) return;
            }

            let valorTotalCalculado = quantidadeCotas * valorCota;

            let novoProvento = { 
                id: Date.now(), 
                ativo,
                valor: valorTotalCalculado, 
                mesRef 
            };
            
            listaDividendos.push(novoProvento);
            localStorage.setItem("carteira_dividendos", JSON.stringify(listaDividendos));
            
            inputAtivo.value = "";
            inputValorCota.value = "";
            document.getElementById("aviso-qtd-carteira").innerText = "";
            
            renderizarDividendos();
            renderizarCards(cacheAtivosCarteira, cacheCotacaoDolar);
        }

        function excluirDividendo(id) {
            listaDividendos = listaDividendos.filter(item => item.id !== id);
            localStorage.setItem("carteira_dividendos", JSON.stringify(listaDividendos));
            
            renderizarDividendos();
            renderizarCards(cacheAtivosCarteira, cacheCotacaoDolar);
        }

        function renderizarDividendos() {
            let tbody = document.getElementById("tabela-dividendos-body");
            let filtroMes = document.getElementById("filtro-mes-div").value; 
            tbody.innerHTML = "";

            let totalDoMes = 0;
            
            let dividendosFiltrados = listaDividendos.filter(item => {
                let mesItemFormato = item.mesRef; 
                if (mesItemFormato && mesItemFormato.includes('-')) {
                    const [ano, mes] = mesItemFormato.split('-');
                    mesItemFormato = `${mes}/${ano}`;
                }
                return mesItemFormato === filtroMes;
            });

            if (dividendosFiltrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-12 text-center text-slate-500">Nenhum provento lançado para este mês.</td></tr>';
                document.getElementById("total-mes-dividendos").innerText = "R$ 0,00";
                return;
            }

            dividendosFiltrados.forEach(item => {
                totalDoMes += item.valor;
                
                let dataExibicao = item.mesRef;
                if (dataExibicao.includes('-')) {
                    const [ano, mes] = dataExibicao.split('-');
                    dataExibicao = `${mes}/${ano}`;
                }

                let tr = document.createElement("tr");
                tr.className = "border-b border-slate-700/40 hover:bg-slate-800/20 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-2 sm:px-5 text-center font-bold text-slate-200">${item.ativo}</td>
                    <td class="py-4 px-2 sm:px-5 text-center font-medium">${dataExibicao}</td>
                    <td class="py-4 px-2 sm:px-5 text-center font-mono font-semibold text-emerald-400"> ${formatarNumeroApenas(item.valor)}</td>
                    <td class="py-4 px-2 sm:px-5 text-center">
                        <button onclick="excluirDividendo(${item.id})" class="text-rose-500 hover:text-rose-400 text-xs font-semibold px-2 py-1 rounded-[12px] bg-rose-500/10 border border-rose-500/20 hover:bg-rose-500/20 transition-all">
                            Excluir
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById("total-mes-dividendos").innerText = "R$ " + formatarNumeroApenas(totalDoMes);
        }

        // Inicialização automática das rotinas
        window.onload = function() {
            let hoje = new Date();
            let ano = hoje.getFullYear();
            let mes = (hoje.getMonth() + 1).toString().padStart(2, '0');
            
            document.getElementById("filtro-mes-div").value = `${mes}/${ano}`;
            
            try {
                let dividendosSalvos = localStorage.getItem("carteira_dividendos");
                if (dividendosSalvos) listaDividendos = JSON.parse(dividendosSalvos);
            } catch(e) {}

            let ultimaAbaSalva = 'carteira';
            try {
                ultimaAbaSalva = localStorage.getItem("dashboard_aba_atual") || 'carteira';
            } catch(e) {}
            
            setTimeout(() => {
                alternarAba(ultimaAbaSalva, true);
                if (ultimaAbaSalva === 'dividendos') renderizarDividendos();
            }, 100);
            
            // Puxa imediatamente ao abrir a tela
            puxarDadosDaPlanilha();

            // SUCESSO: Roda a atualização oculta a cada 2 minutos (120000 milissegundos)
            setInterval(puxarDadosDaPlanilha, 120000);
        };
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker registrado com sucesso!', reg))
            .catch(err => console.error('Erro ao registrar o Service Worker:', err));
        });
      }
    </script>
