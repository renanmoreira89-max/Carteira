<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Dashboard de Investimentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12">

    <!-- TELA DE BLOQUEIO BIOMÉTRICO -->
    <div id="tela-bloqueio" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl max-w-sm w-full text-center space-y-6 shadow-2xl">
            <div class="mx-auto w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11a5 5 0 00-10 0c0 .324.015.646.046.965m15.42 3.125A13.906 13.906 0 0015 11V9a7 7 0 00-14 0v2c0 3.166-1.053 6.085-2.824 8.428m11.574-1.92L14.34 18M11 20h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div>
                <h2 class="text-xl font-bold text-white">App Bloqueado</h2>
                <p class="text-sm text-slate-400 mt-1">Autentique-se para ver o seu patrimônio</p>
            </div>
            <button type="button" onclick="solicitarBiometria()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-all shadow-lg shadow-emerald-900/20">
                Desbloquear com Biometria
            </button>
            <p id="erro-biometria" class="text-xs text-rose-400 hidden"></p>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="border-b border-slate-700 bg-slate-900 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-emerald-500/10 text-emerald-400 rounded-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.003 9.003 0 1020.945 13H11V3.055z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>
                </div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">Minha Carteira</h1>
                </div>
            </div>
            
            <div class="flex bg-slate-800 p-1 rounded-2xl border border-slate-700">
                <button onclick="alternarAba('carteira')" id="btn-aba-carteira" class="px-4 py-2 text-sm font-medium rounded-xl bg-emerald-600 text-white transition-all">
                    Patrimônio
                </button>
                <button onclick="alternarAba('dividendos')" id="btn-aba-dividendos" class="px-4 py-2 text-sm font-medium rounded-xl text-slate-400 hover:text-slate-200 transition-all">
                    Proventos
                </button>
            </div>
        </div>
    </nav>

    <!-- ABA 1: PATRIMÔNIO -->
    <main id="conteudo-carteira" class="max-w-4xl mx-auto px-4 mt-8 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6">
                <p class="text-2xl font-medium text-slate-400">Saldo Total</p>
                <p id="card-total" class="text-4xl font-bold mt-2 text-emerald-400">R$ 0,00</p>
            </div>
            <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6">
                <p class="text-2xl font-medium text-slate-400">Brasil</p>
                <p id="card-nacional" class="text-4xl font-bold mt-2 text-white">R$ 0,00</p>
            </div>
            <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6">
                <p class="text-2xl font-medium text-slate-400">Exterior</p>
                <p id="card-exterior" class="text-4xl font-bold mt-2 text-blue-400">US$ 0,00</p>
                <p id="card-exterior-brl" class="text-sm text-slate-500 mt-1">Câmbio: R$ 0,00</p>
            </div>
        </div>

        <div id="lista-ativos-cards" class="space-y-3">
            <div class="text-center py-12 text-slate-500 bg-slate-800/20 border border-slate-700 rounded-3xl">
                Nenhum dado carregado da planilha.
            </div>
        </div>

        <div class="bg-slate-800/40 border border-slate-700 rounded-3xl p-4 flex flex-col sm:flex-row items-end gap-4">
            <div class="w-full flex-1">
                <label class="block text-xs font-medium text-slate-400 mb-1">LINK DA PLANILHA (.TSV)</label>
                <input type="text" id="input-url" placeholder="Cole o link .tsv do Google aqui se quiser alterar a fonte padrão" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white text-xs focus:outline-none focus:border-emerald-500">
            </div>
            <button type="button" onclick="puxarDadosDaPlanilha()" class="w-full sm:w-auto h-9 px-5 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-2xl transition-all text-3xs shadow-md flex items-center justify-center gap-2 whitespace-nowrap">
                ATUALIZAR
            </button>
        </div>
    </main>

    <!-- ABA 2: PROVENTOS -->
    <main id="conteudo-dividendos" class="hidden max-w-7xl mx-auto px-4 sm:px-6 mt-8 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center bg-slate-800/40 border border-slate-700 rounded-3xl p-6">
            <div>
                <label class="block text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">Mês</label>
                <input type="month" id="filtro-mes-div" onchange="renderizarDividendos()" class="bg-slate-900 border border-slate-700 text-white rounded-2xl px-4 py-2.5 w-full focus:outline-none focus:border-emerald-500 font-medium">
            </div>
            <div class="md:col-span-2 text-right sm:text-right md:pr-6">
                <p class="text-sm font-medium text-slate-400">Total Previsto no Mês</p>
                <p id="total-mes-dividendos" class="text-4xl font-bold text-emerald-400 mt-1">R$ 0,00</p>
            </div>
        </div>

        <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-6 space-y-4">
            <h3 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                Provento
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">CÓDIGO / ATIVO</label>
                    <input type="text" id="div-input-ativo" oninput="atualizarAvisoQuantidade()" placeholder= "" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-3 py-2 text-white font-bold uppercase placeholder:font-normal focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">TIPO</label>
                    <select id="div-input-tipo" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-3 py-2 text-white focus:outline-none focus:border-emerald-500">
                        <option value="Dividendo">Provento</option>
                        <option value="JCP">JCP</option>
                        <option value="Rendimento">Rendimento (FII)</option>
                    </select>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-xs text-slate-400">VALOR POR COTA (R$)</label>
                        <span id="aviso-qtd-carteira" class="text-3xs text-emerald-400 font-medium"></span>
                    </div>
                    <input type="number" step="0.0001" id="div-input-valor-cota" placeholder="" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-3 py-2 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <button type="button" onclick="adicionarDividendo()" class="w-full h-10 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-2xl transition-all text-2xs shadow-md">
                    ADICIONAR
                </button>
            </div>
        </div>

        <div class="bg-slate-800/20 border border-slate-700 rounded-3xl overflow-hidden w-full">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider bg-slate-900/50">
                            <th class="py-4 px-5 text-center">Ativo</th>
                            <th class="py-4 px-5 text-center">Tipo</th>
                            <th class="py-4 px-5 text-center">Mês</th>
                            <th class="py-4 px-5 text-center">Valor</th>
                            <th class="py-4 px-5 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-dividendos-body" class="divide-y divide-slate-800/60 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const LINK_PLANILHA_PADRAO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSANcAncbi_YPcolHZquRIHo1ExH6Rzbd7rMtkAj1uevsa_M8_nXwl-ZMffOrKCTcxIVf79fy33H1I/pub?output=tsv"; 

        let listaDividendos = [];
        let cacheAtivosCarteira = [];

        // ================= SISTEMA DE BIOMETRIA (WEBAUTHN LOCAL) =================

        async function solicitarBiometria() {
            const erroSpan = document.getElementById("erro-biometria");
            erroSpan.classList.add("hidden");

            // Verifica se o dispositivo suporta validação biométrica local (Windows Hello, TouchID, FaceID, Android Lock)
            if (!window.PublicKeyCredential || !await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()) {
                // Caso o aparelho não possua biometria configurada ou o link não seja HTTPS / Localhost
                desbloquearAppSemBiometria();
                return;
            }

            // Desafio fictício necessário para invocar a credencial do sistema operacional
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);

            const options = {
                publicKey: {
                    challenge: challenge,
                    rp: { name: "Dashboard Investimentos" },
                    user: {
                        id: new Uint8Array([1, 2, 3, 4]),
                        name: "usuario@carteira.local",
                        displayName: "Investidor"
                    },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform",
                        userVerification: "required"
                    },
                    timeout: 60000
                }
            };

            try {
                // Chama a caixinha nativa de biometria do sistema/telemóvel
                await navigator.credentials.create(options);
                // Se o usuário passou na validação, esconde a tela de bloqueio
                document.getElementById("tela-bloqueio").classList.add("hidden");
                puxarDadosDaPlanilha();
            } catch (err) {
                console.error("Erro na autenticação:", err);
                erroSpan.innerText = "Falha no reconhecimento. Tente novamente.";
                erroSpan.classList.remove("hidden");
            }
        }

        function desbloquearAppSemBiometria() {
            // Fallback caso rode localmente via arquivo puro de forma que o navegador bloqueie a API
            console.warn("Biometria indisponível ou ambiente inseguro (necessário HTTPS ou Localhost). Liberando acesso padrão.");
            document.getElementById("tela-bloqueio").classList.add("hidden");
            puxarDadosDaPlanilha();
        }

        // ================= SISTEMA DE CARTEIRA (GOOGLE SHEETS) =================

        function alternarAba(aba) {
            const conteudoCarteira = document.getElementById("conteudo-carteira");
            const conteudoDividendos = document.getElementById("conteudo-dividendos");
            const btnCarteira = document.getElementById("btn-aba-carteira");
            const btnDividendos = document.getElementById("btn-aba-dividendos");

            if (aba === 'carteira') {
                conteudoCarteira.classList.remove("hidden");
                conteudoDividendos.classList.add("hidden");
                btnCarteira.className = "px-4 py-2 text-sm font-medium rounded-xl bg-emerald-600 text-white transition-all";
                btnDividendos.className = "px-4 py-2 text-sm font-medium rounded-xl text-slate-400 hover:text-slate-200 transition-all";
            } else {
                conteudoCarteira.classList.add("hidden");
                conteudoDividendos.classList.remove("hidden");
                btnCarteira.className = "px-4 py-2 text-sm font-medium rounded-xl text-slate-400 hover:text-slate-200 transition-all";
                btnDividendos.className = "px-4 py-2 text-sm font-medium rounded-xl bg-emerald-600 text-white transition-all";
                renderizarDividendos();
            }
        }

        function tratarNumeroBR(valor) {
            if (!valor) return 0;
            let limpo = valor.toString().replace('%', '').trim().replace(/\s/g, '');
            if (limpo.includes('.') && limpo.includes(',')) {
                limpo = limpo.replace(/\./g, '').replace(',', '.');
            } else {
                limpo = limpo.replace(',', '.');
            }
            let num = parseFloat(limpo);
            return isNaN(num) ? 0 : num;
        }

        function formatarNumeroApenas(valor) {
            return valor.toFixed(2).replace('.', ',').replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        }

        function formatarQuantidade(valor) {
            return Math.round(valor).toString().replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        }

        function formatarVariacaoApenasPorcentagem(valor) {
            if (valor > 0) {
                return { texto: `(+${valor.toFixed(2).replace('.', ',')}%)`, classe: 'text-emerald-400' };
            } else if (valor < 0) {
                return { texto: `(-${Math.abs(valor).toFixed(2).replace('.', ',')}%)`, classe: 'text-rose-400' };
            }
            return { texto: '(0,00%)', classe: 'text-slate-400' };
        }

        function puxarDadosDaPlanilha() {
            let urlInput = document.getElementById("input-url").value.trim();
            let url = urlInput || LINK_PLANILHA_PADRAO;

            if (!url) return;

            try { localStorage.setItem("carteira_url_tsv", url); } catch(e) {}

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("Erro na requisição");
                    return response.text();
                })
                .then(text => { processarDadosTSV(text); })
                .catch(error => { console.error(error); });
        }

        function processarDadosTSV(conteudo) {
            let lines = conteudo.split(/\r?\n/);
            let ativos = [];
            let cotacaoDolar = 5.40;

            for (let i = 0; i < lines.length; i++) {
                let colunas = lines[i].split('\t');
                if (colunas.length < 5) continue;

                let ticker = colunas[0].trim().toUpperCase();
                if (ticker === "ATIVO" || ticker === "TICKER" || ticker === "CÓDIGO" || ticker === "") continue;

                let qtd = tratarNumeroBR(colunas[1]);
                let precoAtivo = tratarNumeroBR(colunas[2]); 
                let totalItem = tratarNumeroBR(colunas[3]);  
                
                if (ticker === 'CAMBIO' || ticker === 'DOLAR' || colunas[5]?.trim().toLowerCase() === 'cambio') {
                    if (precoAtivo > 0) cotacaoDolar = precoAtivo; 
                    continue; 
                }

                let variacaoPct = tratarNumeroBR(colunas[4]); 
                let tipo = colunas[5] ? colunas[5].trim().toLowerCase() : 'nacional';
                
                let pctAtual = colunas[6] ? tratarNumeroBR(colunas[6]) : 0;
                let pctIdeal = colunas[7] ? tratarNumeroBR(colunas[7]) : 0;

                ativos.push({ ticker, qtd, precoAtivo, totalItem, variacaoPct, tipo, pctAtual, pctIdeal });
            }
            cacheAtivosCarteira = ativos;
            renderizarCards(ativos, cotacaoDolar);
            atualizarAvisoQuantidade();
        }

        function renderizarCards(ativos, dolar) {
            let container = document.getElementById("lista-ativos-cards");
            container.innerHTML = "";
            let totalNacional = 0;
            let totalExteriorUsd = 0;

            if (ativos.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-slate-500 bg-slate-800/20 border border-slate-700 rounded-2xl">Nenhum ativo válido encontrado.</div>';
                return;
            }

            ativos.forEach(item => {
                if (item.tipo === 'nacional') { totalNacional += item.totalItem; } 
                else { totalExteriorUsd += item.totalItem; }

                let infoVariacao = formatarVariacaoApenasPorcentagem(item.variacaoPct);
                let prefixoMoeda = item.tipo === 'nacional' ? 'R$' : 'US$';

                let card = document.createElement("div");
                card.className = "bg-slate-900 border border-slate-700/80 rounded-xl p-4 flex justify-between items-center hover:border-slate-700/60 transition-all shadow-sm";
                
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="flex items-baseline gap-2">
                            <span class="text-lg font-bold tracking-wide text-white">${item.ticker}</span>
                            <span class="text-xs font-semibold text-slate-500">(${formatarQuantidade(item.qtd)})</span>
                        </div>
                        <div class="text-xs font-medium text-slate-400">
                            <span>${item.pctAtual.toFixed(2).replace('.', ',')}%</span>
                            <span class="text-slate-600 mx-1">/</span>
                            <span class="text-slate-400">${item.pctIdeal.toFixed(2).replace('.', ',')}%</span>
                        </div>
                    </div>
                    <div class="text-right space-y-0.5">
                        <div class="text-base font-bold tracking-tight text-slate-100">
                            ${prefixoMoeda} ${formatarNumeroApenas(item.totalItem)}
                        </div>
                        <div class="text-xs font-mono text-slate-400 flex justify-end items-center gap-1.5">
                            <span>${formatarNumeroApenas(item.precoAtivo)}</span>
                            <span class="${infoVariacao.classe} font-semibold">${infoVariacao.texto}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            let totalExteriorBrl = totalExteriorUsd * dolar;
            let saldoGeralBrl = totalNacional + totalExteriorBrl;

            document.getElementById("card-total").innerText = "R$ " + formatarNumeroApenas(saldoGeralBrl);
            document.getElementById("card-nacional").innerText = "R$ " + formatarNumeroApenas(totalNacional);
            document.getElementById("card-exterior").innerText = "US$ " + formatarNumeroApenas(totalExteriorUsd);
            document.getElementById("card-exterior-brl").innerText = "Câmbio USD/BRL: R$ " + dolar.toFixed(2).replace('.', ',');
        }

        // ================= GESTÃO DE DIVIDENDOS =================

        function atualizarAvisoQuantidade() {
            let ativoDigitado = document.getElementById("div-input-ativo").value.trim().toUpperCase();
            let avisoSpan = document.getElementById("aviso-qtd-carteira");
            
            if (!ativoDigitado) {
                avisoSpan.innerText = "";
                return;
            }

            let ativoLocalizado = cacheAtivosCarteira.find(a => a.ticker === ativoDigitado);
            if (ativoLocalizado) {
                avisoSpan.innerText = `${formatarQuantidade(ativoLocalizado.qtd)} cotas encontradas`;
            } else {
                avisoSpan.innerText = "0 cotas encontradas";
            }
        }

        function adicionarDividendo() {
            let inputAtivo = document.getElementById("div-input-ativo");
            let inputTipo = document.getElementById("div-input-tipo");
            let inputValorCota = document.getElementById("div-input-valor-cota");
            let filtroMes = document.getElementById("filtro-mes-div");

            let ativo = inputAtivo.value.trim().toUpperCase();
            let tipo = inputTipo.value;
            let valorCota = parseFloat(inputValorCota.value);
            let mesRef = filtroMes.value;

            if (!ativo || isNaN(valorCota) || valorCota <= 0 || !mesRef) {
                alert("Por favor, preencha todos os campos corretamente.");
                return;
            }

            let ativoNaCarteira = cacheAtivosCarteira.find(a => a.ticker === ativo);
            let quantidadeCotas = ativoNaCarteira ? ativoNaCarteira.qtd : 0;

            if (quantidadeCotas === 0) {
                let confirmar = confirm(`Você possui 0 cotas listadas de ${ativo} hoje na carteira. O valor calculado será R$ 0,00. Deseja prosseguir?`);
                if (!confirmar) return;
            }

            let valorTotalCalculado = quantidadeCotas * valorCota;

            let novoProvento = { 
                id: Date.now(), 
                ativo, 
                tipo, 
                valor: valorTotalCalculado, 
                mesRef 
            };
            
            listaDividendos.push(novoProvento);
            localStorage.setItem("carteira_dividendos", JSON.stringify(listaDividendos));
            
            inputAtivo.value = "";
            inputValorCota.value = "";
            document.getElementById("aviso-qtd-carteira").innerText = "";
            renderizarDividendos();
        }

        function excluirDividendo(id) {
            listaDividendos = listaDividendos.filter(item => item.id !== id);
            localStorage.setItem("carteira_dividendos", JSON.stringify(listaDividendos));
            renderizarDividendos();
        }

        function renderizarDividendos() {
            let tbody = document.getElementById("tabela-dividendos-body");
            let filtroMes = document.getElementById("filtro-mes-div").value;
            tbody.innerHTML = "";

            let totalDoMes = 0;
            let dividendosFiltrados = listaDividendos.filter(item => item.mesRef === filtroMes);

            if (dividendosFiltrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-12 text-center text-slate-500">Nenhum provento lançado para este mês.</td></tr>';
                document.getElementById("total-mes-dividendos").innerText = "R$ 0,00";
                return;
            }

            dividendosFiltrados.forEach(item => {
                totalDoMes += item.valor;
                let partesData = item.mesRef.split('-');
                let dataFormatada = `${partesData[1]}/${partesData[0]}`;

                let tr = document.createElement("tr");
                tr.className = "border-b border-slate-700/40 hover:bg-slate-800/20 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-5 text-center font-bold text-slate-200">${item.ativo}</td>
                    <td class="py-4 px-5 text-center text-slate-400">${item.tipo}</td>
                    <td class="py-4 px-5 text-center font-medium">${dataFormatada}</td>
                    <td class="py-4 px-5 text-center font-mono font-semibold text-emerald-400">R$ ${formatarNumeroApenas(item.valor)}</td>
                    <td class="py-4 px-5 text-center">
                        <button onclick="excluirDividendo(${item.id})" class="text-rose-500 hover:text-rose-400 text-xs font-semibold px-2 py-1 rounded bg-rose-500/10 border border-rose-500/20 hover:bg-rose-500/20 transition-all">
                            Excluir
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById("total-mes-dividendos").innerText = "R$ " + formatarNumeroApenas(totalDoMes);
        }

        window.onload = function() {
            let hoje = new Date();
            let ano = hoje.getFullYear();
            let mes = (hoje.getMonth() + 1).toString().padStart(2, '0');
            document.getElementById("filtro-mes-div").value = `${ano}-${mes}`;

            try {
                let urlSalva = localStorage.getItem("carteira_url_tsv");
                if (urlSalva) document.getElementById("input-url").value = urlSalva;
            } catch(e) {}
            
            try {
                let dividendosSalvos = localStorage.getItem("carteira_dividendos");
                if (dividendosSalvos) listaDividendos = JSON.parse(dividendosSalvos);
            } catch(e) {}

            // Dispara o pedido de biometria imediatamente ao abrir o app
            solicitarBiometria();
        };
    </script>
</body>
</html>
